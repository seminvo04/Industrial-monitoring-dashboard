version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: industrial_monitoring_db
    environment:
      POSTGRES_USER: industrial_user
      POSTGRES_PASSWORD: industrial_pass
      POSTGRES_DB: industrial_monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U industrial_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
